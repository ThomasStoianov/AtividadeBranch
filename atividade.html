<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Dashboard - Ciência de Dados</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            background:
                radial-gradient(circle at 20% 20%, #1a1a1a, #000000),
                radial-gradient(circle at 80% 80%, #111111, #000000);

            color: white;

            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .dashboard-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            padding: 35px;
            border-radius: 16px;

            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);

            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #ffffff;
            margin-bottom: 20px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: rgba(255,255,255,0.08);
            padding: 18px;
            border-radius: 10px;

            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .card-label {
            font-size: 14px;
            color: #ffffff;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>Dashboard Analítico</h1>
        
        <div class="metrics-grid">
            <div class="card">
                <span class="card-value">94.2%</span>
                <span class="card-label">Acurácia</span>
            </div>
            <div class="card">
                <span class="card-value">1.2s</span>
                <span class="card-label">Latência</span>
            </div>
        </div>

        <p style="margin-top: 25px; font-size: 12px; color: #ffffff;
                    font-size: 15px;">
            Status do Servidor: <span style="color: rgb(255, 255, 255);
            margin-left: 25px;">● Online</span>
        </p>
    </div>

</body>
</html>
